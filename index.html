<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPAZZ</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* --- BASE44 NEBULA DESIGN SYSTEM --- */
        :root {
            --neon-pink: #ff00ff;
            --neon-cyan: #00ffff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        *,*::before,*::after{box-sizing:border-box;}
        
        body,html{
            margin:0;padding:0;
            background: #000 url(https://media.base44.com/images/public/69e5128edd9f705dafff6a9b/d44e87d3c_generated_image.png) no-repeat center center fixed;
            background-size: cover;
            font-family:'Inter',sans-serif;
            color:#fff;height:100%;overflow:hidden;
        }

        /* SCREENS */
        .screen{display:none;width:100%;height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
        .screen.active{display:flex;}

        /* AUTH ELEMENTS */
        .ping-badge {
            display: inline-flex; align-items: center;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50px; padding: 6px 14px;
            font-size: 0.65rem; letter-spacing: 2px;
            text-transform: uppercase; margin-bottom: 20px;
            backdrop-filter: blur(5px); z-index: 10;
        }
        .ping-badge::before {
            content: ""; width: 6px; height: 6px;
            background: var(--neon-pink); border-radius: 50%;
            margin-right: 10px; box-shadow: 0 0 10px var(--neon-pink);
            animation: pulse-ring 2s infinite;
        }
        @keyframes pulse-ring { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .logo{
            font-size:3rem; font-weight:900; letter-spacing:10px;
            color:#fff; text-shadow:0 0 15px var(--neon-pink);
            margin-bottom:8px; text-transform: uppercase;
        }
        .tagline{font-size:0.75rem; letter-spacing:5px; color:var(--neon-cyan); margin-bottom:36px; text-transform:uppercase;}

        .auth-box{
            width:100%; max-width:360px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 28px 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .auth-tabs{display:flex;margin-bottom:24px;border-bottom:1px solid rgba(255,255,255,0.1);}
        .auth-tab{flex:1;padding:10px;text-align:center;font-size:0.85rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;color:rgba(255,255,255,0.4);border-bottom:2px solid transparent;transition:all 0.2s;}
        .auth-tab.active{color:var(--neon-pink);border-bottom-color:var(--neon-pink);}

        .auth-form{display:none;flex-direction:column;gap:14px;}
        .auth-form.active{display:flex;}
        .auth-form input,.auth-form select{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:12px 16px;color:#fff;font-size:0.9rem;outline:none;}
        
        .auth-btn{
            background:transparent; border:2px solid var(--neon-pink);
            color:#fff; padding:14px; border-radius:25px;
            font-weight:700; font-size:0.85rem; letter-spacing:2px;
            text-transform:uppercase; cursor:pointer; margin-top:6px;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
            transition: 0.3s;
        }
        .auth-btn:hover{ background: var(--neon-pink); box-shadow: 0 0 30px var(--neon-pink); color: #000; }
        
        #google-btn{ background: #fff !important; color: #000 !important; border:none; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 10px;}

        /* BOOT SCREEN */
        #boot-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:black;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1s ease;}
        .glitch-text{color:var(--neon-cyan);letter-spacing:5px;font-size:0.7rem;text-align:center;}

        #toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(20,20,20,0.95);border:1px solid var(--neon-pink);color:#fff;padding:12px 24px;border-radius:30px;font-size:0.85rem;z-index:9000;opacity:0;transition:opacity 0.3s;pointer-events:none;}
        #toast.show{opacity:1;}
    </style>
</head>
<body>

<div id="boot-screen">
    <p class="glitch-text">INITIALIZING SPAZZ...<br>CONNECTING TO NETWORK</p>
</div>

<div id="toast"></div>

<div id="auth-screen" class="screen">
    <div class="ping-badge">Nearby User Ping Active</div>
    <div class="logo">SPAZZ</div>
    <div class="tagline">Find your people</div>
    
    <div class="auth-box">
        <div class="auth-tabs">
            <div class="auth-tab active" onclick="switchAuthTab('login')">Login</div>
            <div class="auth-tab" onclick="switchAuthTab('register')">Join</div>
        </div>
        
        <form class="auth-form active" id="login-form" onsubmit="doLogin(event)">
            <input type="text" id="login-username" placeholder="Username" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button type="submit" class="auth-btn">Enter the Grid</button>
        </form>

        <form class="auth-form" id="register-form" onsubmit="doRegister(event)">
            <input type="text" id="reg-username" placeholder="Choose a username" required>
            <input type="password" id="reg-password" placeholder="Password" required>
            <input type="number" id="reg-age" placeholder="Age" min="18" max="99" required>
            <select id="reg-gender"><option value="male">Male</option><option value="female">Female</option></select>
            <button type="submit" class="auth-btn">Create Account</button>
        </form>

        <button id="google-btn" class="auth-btn">
            <img src="https://www.google.com/favicon.ico" width="18"> Continue with Google
        </button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // 1. Setup Supabase
    const supabaseUrl = 'https://kytmktshrywvxigobsxd.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5dG1rdHNocnl3dnhpZ29ic3hkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1Mzk3MjQsImV4cCI6MjA5MjExNTcyNH0.VZ9FxwNHsRwK_CiTio_8MJVFJv7E6sKP9PfciN93bn4'; 
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // 2. Auth Logic
    async function spazzLogin() {
        const { data, error } = await supabaseClient.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.origin }
        });
        if (error) toast("Error: " + error.message);
    }

    function switchAuthTab(tab) {
        document.getElementById('login-form').classList.toggle('active', tab === 'login');
        document.getElementById('register-form').classList.toggle('active', tab === 'register');
        document.querySelectorAll('.auth-tab').forEach((el, idx) => el.classList.toggle('active', (idx === 0 && tab === 'login') || (idx === 1 && tab === 'register')));
    }

    function toast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg; el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 3000);
    }

    // 3. Init UI
    window.addEventListener('load', () => {
        const loginBtn = document.getElementById('google-btn');
        if (loginBtn) loginBtn.onclick = spazzLogin;

        setTimeout(() => {
            const boot = document.getElementById('boot-screen');
            if (boot) {
                boot.style.opacity = '0';
                setTimeout(() => { 
                    boot.remove(); 
                    document.getElementById('auth-screen').classList.add('active'); 
                }, 1000);
            }
        }, 2000);
    });
</script>
</body>
</html>
