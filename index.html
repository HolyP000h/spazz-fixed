<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <div class="ping-badge">Nearby User Ping Active</div>
    <title>SPAZZ</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;}
        body,html{margin:0;padding:0;background:#000;font-family:'Inter',sans-serif;color:#fff;height:100%;overflow:hidden;}

        /* SCREENS */
        .screen{display:none;width:100%;height:100vh;}
        .screen.active{display:flex;}

        /* AUTH */
        #auth-screen{flex-direction:column;align-items:center;justify-content:center;background:#000;padding:24px;}
        .logo{font-size:2.8rem;font-weight:700;letter-spacing:6px;color:#ff00ff;text-shadow:0 0 20px #ff00ff;margin-bottom:8px;}
        .tagline{font-size:0.7rem;letter-spacing:3px;color:#00ffff;margin-bottom:36px;text-transform:uppercase;}
        .auth-box{width:100%;max-width:360px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,0,255,0.3);border-radius:16px;padding:28px 24px;}
        .auth-tabs{display:flex;margin-bottom:24px;border-bottom:1px solid rgba(255,255,255,0.1);}
        .auth-tab{flex:1;padding:10px;text-align:center;font-size:0.85rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;color:rgba(255,255,255,0.4);border-bottom:2px solid transparent;transition:all 0.2s;}
        .auth-tab.active{color:#ff00ff;border-bottom-color:#ff00ff;}
        .auth-form{display:none;flex-direction:column;gap:14px;}
        .auth-form.active{display:flex;}
        .auth-form input,.auth-form select{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:12px 16px;color:#fff;font-size:0.9rem;outline:none;transition:border-color 0.2s;}
        .auth-form input:focus,.auth-form select:focus{border-color:#ff00ff;}
        .auth-btn{background:#ff00ff;border:none;color:#fff;padding:14px;border-radius:25px;font-weight:700;font-size:0.85rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:6px;}
        
        #google-btn{background: #fff; color: #000; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px;}

        /* ADMIN & USER UI STYLES REMAIN SAME */
        #boot-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:black;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1s ease;}
        .poster-logo{max-width:70%;max-height:60vh;margin-bottom:20px;}
        .glitch-text{color:#00ffff;letter-spacing:5px;font-size:0.7rem;text-align:center;}
        #map{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background:#050505;}
        #status{position:fixed;top:20px;left:20px;z-index:1000;padding:12px 20px;background:rgba(0,0,0,0.85);border:1px solid #ff00ff;color:#00ffff;font-weight:bold;letter-spacing:2px;text-transform:uppercase;font-size:0.8rem;}
        .tab-bar{display:flex;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;}
        .tab{flex:1;padding:12px 4px;text-align:center;font-size:0.6rem;cursor:pointer;color:rgba(255,255,255,0.4);}
        .tab.active{color:#ff00ff;border-bottom:2px solid #ff00ff;}
        .tab-content{display:none;flex:1;overflow-y:auto;flex-direction:column;}
        .tab-content.active{display:flex;}
        #toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(20,20,20,0.95);border:1px solid rgba(255,0,255,0.4);color:#fff;padding:12px 24px;border-radius:30px;font-size:0.85rem;z-index:9000;opacity:0;transition:opacity 0.3s;}
        #toast.show{opacity:1;}
        #flash-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:8000;pointer-events:none;opacity:0;}
    </style>
</head>
<body>

<div id="boot-screen">
    <img src="static/poster.png" class="poster-logo" onerror="this.style.display='none'">
    <p class="glitch-text">INITIALIZING SPAZZ...<br>CONNECTING TO NETWORK</p>
</div>

<div id="toast"></div>
<div id="flash-overlay"></div>

<div id="auth-screen" class="screen">
    <div class="logo">SPAZZ</div>
    <div class="tagline">Find your people</div>
    <div class="auth-box">
        <div class="auth-tabs">
            <div class="auth-tab active" onclick="switchAuthTab('login')">Login</div>
            <div class="auth-tab" onclick="switchAuthTab('register')">Join</div>
        </div>
        
        <form class="auth-form active" id="login-form" onsubmit="doLogin(event)">
            <input type="text" id="login-username" placeholder="Username" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button type="submit" class="auth-btn">Enter the Grid</button>
        </form>

        <form class="auth-form" id="register-form" onsubmit="doRegister(event)">
            <input type="text" id="reg-username" placeholder="Choose a username" required>
            <input type="password" id="reg-password" placeholder="Password" required>
            <input type="number" id="reg-age" placeholder="Age" min="18" max="99" required>
            <select id="reg-gender"><option value="male">Male</option><option value="female">Female</option></select>
            <button type="submit" class="auth-btn">Create Account</button>
        </form>

        <button id="google-btn" class="auth-btn">
            <img src="https://www.google.com/favicon.ico" width="18"> Continue with Google
        </button>
    </div>
</div>

<div id="user-screen" class="screen" style="flex-direction:column;">
    <div class="top-nav" style="padding:20px; border-bottom:1px solid #333;">
        <div class="app-name" style="color:#ff00ff; font-weight:bold; letter-spacing:4px;">SPAZZ</div>
    </div>
    <div id="coach-panel" class="tab-content active" style="padding:20px;">
        <div class="coach-bubble" style="border:1px solid #00ffff; padding:15px; color:#00ffff;">Scanning for signals...</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // 1. Setup Supabase
    const supabaseUrl = 'https://kytmktshrywvxigobsxd.supabase.co';
    const supabaseKey = 'PASTE_YOUR_ANON_PUBLIC_KEY_HERE'; // <--- PASTE YOUR KEY HERE
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // 2. Auth Logic
    async function spazzLogin() {
        const { data, error } = await supabaseClient.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.origin }
        });
        if (error) toast("Error: " + error.message);
    }

    function switchAuthTab(tab) {
        document.getElementById('login-form').classList.toggle('active', tab === 'login');
        document.getElementById('register-form').classList.toggle('active', tab === 'register');
        document.querySelectorAll('.auth-tab').forEach((el, idx) => el.classList.toggle('active', (idx === 0 && tab === 'login') || (idx === 1 && tab === 'register')));
    }

    function toast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg; el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 3000);
    }

    // 3. Init UI
    window.addEventListener('load', () => {
        const loginBtn = document.getElementById('google-btn');
        if (loginBtn) loginBtn.onclick = spazzLogin;

        setTimeout(() => {
            const boot = document.getElementById('boot-screen');
            if (boot) {
                boot.style.opacity = '0';
                setTimeout(() => { boot.remove(); document.getElementById('auth-screen').classList.add('active'); }, 1000);
            }
        }, 2000);
    });

    // Placeholder for other logic
    let SESSION = null;
    function logout() { localStorage.removeItem('spazz_session'); location.reload(); }
</script>
</body>
</html>
