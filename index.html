<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spazz — Move. Discover. Connect.</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0512;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 30% 40%, rgba(255,0,255,0.25) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 70% 60%, rgba(255,0,127,0.2) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 50% 80%, rgba(0,255,255,0.1) 0%, transparent 50%);
    }
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      font-size: clamp(3rem, 12vw, 5rem);
      font-weight: 900;
      background: linear-gradient(135deg, #00ffff 0%, #ff00ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    .tagline {
      font-size: 1.1rem;
      color: rgba(240,234,255,0.7);
      letter-spacing: 0.08em;
      margin-bottom: 2.5rem;
    }
    .cta {
      display: inline-block;
      padding: 1rem 2.5rem;
      background: linear-gradient(135deg, #00ffff, #00c4c4);
      color: #0a0512;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 100px;
      box-shadow: 0 0 32px rgba(0,255,255,0.4);
    }
    .status {
      margin-top: 1.5rem;
      font-size: 0.7rem;
      color: rgba(112,96,160,0.8);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">⚡ Spazz</div>
    <p class="tagline">Move. Discover. Connect.</p>
    <a href="#" class="cta">Enter the Grid</a>
    <p class="status">Signal encrypted · Privacy first · v2.0</p>
  </div>
</body>
</html>
