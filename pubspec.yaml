name: spazz
description: Spazz - Wisp hunting social app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # Networking
  http: ^1.2.0

  # Local storage
  shared_preferences: ^2.2.0

  # Maps
  google_maps_flutter: ^2.5.0

  # Location
  geolocator: ^11.0.0

  # In-App Purchases (iOS + Android)
  in_app_purchase: ^3.1.0

  # Google Sign In
  google_sign_in: ^6.2.0

  # Icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
