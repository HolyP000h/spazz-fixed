name: Python Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # We use '|| true' because if requirements.txt isn't there yet, we don't want to crash
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install fastapi uvicorn  # Ensuring these are here for the check

    - name: Lint check (Syntax check)
      run: |
        # This checks if the code is valid without actually running the server
        python -m py_compile main.py
